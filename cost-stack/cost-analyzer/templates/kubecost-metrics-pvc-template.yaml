{{- if .Values.kubecostMetrics }}
{{- if .Values.kubecostMetrics.exporter }}
{{- if .Values.kubecostMetrics.exporter.enabled }}
{{- if .Values.kubecostMetrics.exporter.persistentVolume }}
{{- if .Values.kubecostMetrics.exporter.persistentVolume.enabled }}
{{- if not .Values.kubecostMetrics.exporter.persistentVolume.existingClaim }}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ template "kubecost.kubeMetricsName" . }}-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "cost-analyzer.commonLabels" . | nindent 4 }}
    app: {{ template "kubecost.kubeMetricsName" . }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.kubecostMetrics.exporter.persistentVolume.storageClass }}
  storageClassName: {{ .Values.kubecostMetrics.exporter.persistentVolume.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.kubecostMetrics.exporter.persistentVolume.size | default "8Gi" }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}