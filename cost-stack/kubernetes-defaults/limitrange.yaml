apiVersion: v1
kind: LimitRange
metadata:
  name: demo-limits
  namespace: demo
spec:
  limits:
  - type: Container

    default:   # this section defines default limits
      cpu: 300m
      memory: 512Mi

    defaultRequest:  # this section defines default requests
      cpu: 100m
      memory: 256Mi

    max:  # max and min define the limit range
      cpu: "1"
      memory: 1Gi

    min:
      cpu: 100m
      memory: 128Mi
